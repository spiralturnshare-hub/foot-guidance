name: Auto Assign Next Issue to Jules
on:
  pull_request:
    branches: [main]
    types: [closed] # PRが閉じられた時
jobs:
  assign-next:
    if: github.event.pull_request.merged == true # かつ、マージされた時のみ
    runs-on: ubuntu-latest
    permissions:
      issues: write
    steps:
      - name: Find and Label Next Issue
        uses: actions/github-script@v7
        with:
          script: |
            // 1. オープンなIssueを古い順（asc）に取得
            const issues = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              sort: 'created',
              direction: 'asc',
              per_page: 30
            });
            // 2. まだ "assign-to-jules" がついていない最初のIssueを特定
            const nextIssue = issues.data.find(issue =>
              !issue.pull_request && // PRではなく純粋なIssueであること
              !issue.labels.some(l => l.name === 'assign-to-jules')
            );

            if (nextIssue) {
              console.log(`Next issue found: #${nextIssue.number}`);

              // 3. ラベルを付与してJulesをキックする
              await github.rest.issues.addLabels({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: nextIssue.number,
                labels: ['assign-to-jules']
              });

              console.log(`Successfully labeled Issue #${nextIssue.number} with 'assign-to-jules'.`);
            } else {
              console.log('No pending issues found without the label.');
            }
